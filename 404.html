<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',system-ui,sans-serif;background:#fff;min-height:100vh;display:flex;flex-direction:column;}
nav{background:#D41367;height:64px;display:flex;align-items:center;padding:0 28px;}
nav img{height:44px;width:auto;}
.main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;text-align:center;}
.code{font-family:'Playfair Display',Georgia,serif;font-size:120px;font-weight:900;color:#fce7f3;line-height:1;margin-bottom:8px;letter-spacing:-4px;}
.title{font-family:'Playfair Display',Georgia,serif;font-size:28px;font-weight:700;color:#111827;margin-bottom:12px;}
.desc{font-size:15px;color:#6B7280;max-width:420px;line-height:1.7;margin-bottom:36px;}

.home-btn:hover{background:#A50E50;transform:translateY(-2px);}
.wheel{font-size:64px;margin-bottom:24px;animation:spin 8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
@media(prefers-reduced-motion:reduce){.wheel{animation:none;}}
footer{background:#7a0a38;padding:16px 28px;text-align:center;font-size:12px;color:rgba(255,255,255,.3);}
