<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Page Not Found · Rotaract District 3860</title>
<meta name="robots" content="noindex, follow"/>
<link rel="icon" type="image/png" href="favicon.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --pink:#D41367; --pink-dark:#A50E50; --pink-light:#fce7f3;
  --gray-500:#6B7280; --gray-900:#111827;
  --font:'Montserrat',system-ui,sans-serif;
}
body{font-family:var(--font);background:#fff;color:var(--gray-900);min-height:100vh;display:flex;flex-direction:column;transition:background .2s,color .2s;}
nav{background:var(--pink);height:64px;display:flex;align-items:center;padding:0 28px;}
nav img{height:40px;width:auto;}
.main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;text-align:center;}
.code{font-family:var(--font);font-weight:900;font-size:120px;color:var(--pink-light);line-height:1;margin-bottom:8px;letter-spacing:-4px;}
.title{font-family:var(--font);font-weight:900;font-size:clamp(24px,4vw,28px);color:var(--gray-900);margin-bottom:12px;letter-spacing:-.3px;}
.desc{font-size:15px;color:var(--gray-500);max-width:420px;line-height:1.7;margin-bottom:36px;}
.home-btn{display:inline-flex;align-items:center;gap:8px;background:var(--pink);color:#fff;font-size:14px;font-weight:700;padding:13px 28px;border-radius:40px;text-decoration:none;transition:background .2s,transform .2s;}
.home-btn:hover{background:var(--pink-dark);transform:translateY(-2px);}
.wheel{font-size:64px;margin-bottom:24px;animation:spin 8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
@media(prefers-reduced-motion:reduce){.wheel{animation:none;}}
footer{background:#7a0a38;padding:18px 28px;text-align:center;font-size:12px;color:rgba(255,255,255,.5);}
footer a{color:rgba(255,255,255,.75);text-decoration:none;font-weight:600;}
footer a:hover{color:#fff;}

body.dark-mode{background:#0f0a0d;color:#f0e8ec;}
body.dark-mode .code{color:rgba(212,19,103,.35);}
body.dark-mode .title{color:#f0e8ec;}
body.dark-mode .desc{color:#9b8a92;}

@media(max-width:600px){
  .code{font-size:80px;letter-spacing:-2px;}
  .main{padding:36px 20px;}
  .wheel{font-size:48px;}
}
</style>
</head>
<body>
<nav><img src="logo-white.png" alt="Rotaract District 3860"/></nav>
<div class="main">
  <div class="wheel">⚙️</div>
  <div class="code">404</div>
  <div class="title">Page Not Found</div>
  <p class="desc">The page you're looking for doesn't exist or may have been moved. Let's get you back on track.</p>
  <a class="home-btn" href="index.html">← Back to Home</a>
</div>
<footer>© 2026 Rotaract Clubs of Rotary International District 3860 · <a href="privacy-policy.html">Privacy</a> · <a href="terms-of-use.html">Terms</a></footer>
<script>
if(localStorage.getItem('theme')==='dark'){ document.body.classList.add('dark-mode'); }
</script>
</body>
</html>
