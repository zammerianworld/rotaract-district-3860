<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
img{display:block;max-width:100%;}
a{text-decoration:none;color:inherit;}
:root{
  --pink:       #D41367;
  --pink-dark:  #A50E50;
  --pink-deep:  #7a0a38;
  --pink-light: #fce7f3;
  --pink-pale:  #fdf2f8;
  --white:      #ffffff;
  --gray-50:    #F9FAFB;
  --gray-100:   #F3F4F6;
  --gray-200:   #E5E7EB;
  --gray-400:   #9CA3AF;
  --gray-500:   #6B7280;
  --gray-700:   #374151;
  --gray-900:   #111827;
  --font-display:'Playfair Display',Georgia,serif;
  --font-body:'Nunito Sans',system-ui,sans-serif;
  --nav-h:68px;
  --r-sm:6px;--r-md:12px;--r-lg:20px;--r-xl:28px;
}
body{font-family:var(--font-body);opacity:0;transition:opacity .4s ease;}
body.loaded{opacity:1;}
.no-fouc{font-size:16px;line-height:1.7;color:var(--heading-color);background:var(--white);overflow-x:hidden;}
.container{max-width:1280px;margin:0 auto;padding:0 48px;}

/* ── NAV ── */
#nav{position:sticky;top:0;z-index:200;height:var(--nav-h);background:var(--pink);}
.nav-inner{height:100%;max-width:1280px;margin:0 auto;padding:0 48px;display:flex;align-items:center;justify-content:space-between;gap:16px;}
.nav-logo img{height:48px;width:auto;display:block;}
.nav-links{display:flex;align-items:center;gap:2px;}
.nav-links a{font-size:13px;font-weight:600;color:rgba(255,255,255,.85);padding:7px 14px;border-radius:40px;transition:all .2s;}
.nav-links a:hover{color:#fff;background:rgba(255,255,255,.15);}
.nav-links .nav-cta{background:#fff;color:var(--pink);margin-left:6px;font-weight:700;}
.nav-links .nav-cta:hover{background:rgba(255,255,255,.92);color:var(--pink-dark);}
.nav-ham{display:none;background:none;border:none;cursor:pointer;color:#fff;font-size:24px;padding:4px;line-height:1;}
#mobile-menu{display:none;flex-direction:column;background:var(--pink-dark);padding:12px 28px 24px;position:sticky;top:var(--nav-h);z-index:199;}
#mobile-menu.open{display:flex;}
#mobile-menu a{font-size:15px;font-weight:600;color:rgba(255,255,255,.85);padding:11px 0;border-bottom:1px solid rgba(255,255,255,.1);}
#mobile-menu a:last-child{border:none;color:#fff;}

/* ── HERO ── */
#hero{position:relative;overflow:hidden;min-height:calc(100vh - var(--nav-h));display:flex;align-items:stretch;}
.hero-left{background:var(--pink);flex:0 0 42%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:64px 48px;position:relative;overflow:hidden;}
.hero-left::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.12) 1px,transparent 1px);background-size:22px 22px;}
.hero-left-logo{position:relative;z-index:1;width:100%;max-width:300px;}
.hero-left-logo img{width:100%;height:auto;filter:brightness(0) invert(1);}
.hero-left-tagline{position:relative;z-index:1;margin-top:28px;font-size:13px;font-weight:600;color:rgba(255,255,255,.7);letter-spacing:1.2px;text-transform:uppercase;text-align:center;}
.hero-right{flex:1;display:flex;flex-direction:column;justify-content:center;padding:72px 64px 72px 56px;background:var(--white);position:relative;}
.hero-right::before{content:'';position:absolute;top:0;bottom:0;left:-2px;width:60px;background:var(--pink);clip-path:polygon(0 0,100% 0,0 100%);pointer-events:none;}
.hero-eyebrow{display:inline-flex;align-items:center;gap:8px;background:var(--pink-light);color:var(--pink-dark);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:6px 16px;border-radius:40px;margin-bottom:24px;}
.hero-eyebrow-dot{width:6px;height:6px;border-radius:50%;background:var(--pink);flex-shrink:0;}
#hero h1{font-family:var(--font-display);font-size:clamp(30px,4.5vw,54px);font-weight:900;color:var(--heading-color);line-height:1.08;margin-bottom:22px;letter-spacing:-.5px;}
#hero h1 em{color:var(--pink);font-style:normal;display:block;}
.hero-sub{font-size:17px;color:var(--gray-500);line-height:1.75;margin-bottom:36px;max-width:420px;}
.hero-btns{display:flex;gap:14px;flex-wrap:wrap;}
.btn{display:inline-flex;align-items:center;gap:8px;font-family:var(--font-body);font-size:14px;font-weight:700;padding:13px 28px;border-radius:40px;cursor:pointer;border:none;transition:all .2s;letter-spacing:.2px;}
.btn-pink{background:var(--pink);color:#fff;box-shadow:0 4px 20px rgba(212,19,103,.35);}
.btn-pink:hover{background:var(--pink-dark);transform:translateY(-2px);box-shadow:0 8px 28px rgba(212,19,103,.4);}
.btn-outline{background:transparent;color:var(--pink);border:2px solid var(--pink);}
.btn-outline:hover{background:var(--pink-light);transform:translateY(-2px);}
.hero-scroll{position:absolute;bottom:32px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--gray-400);font-size:12px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;}
.hero-scroll-line{width:1px;height:40px;background:linear-gradient(to bottom,var(--gray-300),transparent);animation:scrollpulse 2s ease-in-out infinite;}
@keyframes scrollpulse{0%,100%{opacity:.4;transform:scaleY(.8);}50%{opacity:1;transform:scaleY(1);}}

/* ── ADVOCACY BANNER ── */
#advocacy{background:var(--pink-deep);padding:36px 28px;text-align:center;position:relative;overflow:hidden;}
#advocacy::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.08) 1px,transparent 1px);background-size:20px 20px;pointer-events:none;}
.advocacy-inner{position:relative;z-index:1;max-width:680px;margin:0 auto;}
.advocacy-eyebrow{font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:10px;}
.advocacy-theme{font-family:var(--font-display);font-size:clamp(22px,4vw,36px);font-weight:900;color:#fff;margin-bottom:10px;line-height:1.15;}
.advocacy-tagline{font-size:15px;color:rgba(255,255,255,.65);line-height:1.7;margin-bottom:20px;}
.advocacy-cta{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;font-size:13px;font-weight:700;padding:9px 22px;border-radius:40px;text-decoration:none;transition:all .2s;}
.advocacy-cta:hover{background:rgba(255,255,255,.2);}

/* ── IMPACT STRIP ── */
#impact{background:var(--gray-900);padding:0 28px;}
.impact-grid{max-width:1280px;margin:0 auto;display:grid;grid-template-columns:repeat(3,1fr);}
.impact-item{padding:40px 24px;text-align:center;border-right:1px solid rgba(255,255,255,.06);position:relative;}
.impact-item:last-child{border-right:none;}
.impact-item::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:40px;height:3px;background:var(--pink);}
.impact-num{font-family:var(--font-display);font-size:64px;font-weight:900;color:#fff;line-height:1;margin-bottom:6px;}
.impact-lbl{font-size:13px;font-weight:700;color:var(--gray-400);letter-spacing:.8px;text-transform:uppercase;}

/* ── ABOUT ── */
#about{padding:96px 0;position:relative;}
#about::after{content:'';position:absolute;bottom:0;left:0;right:0;height:120px;background:var(--gray-50);clip-path:polygon(0 100%,100% 100%,100% 0);pointer-events:none;}
.section-kicker{display:inline-flex;align-items:center;gap:10px;font-size:12px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--pink);margin-bottom:14px;}
.section-kicker::before{content:'';width:28px;height:2px;background:var(--pink);border-radius:2px;}
.section-heading{font-family:var(--font-display);font-size:clamp(26px,4vw,42px);font-weight:900;color:var(--heading-color);line-height:1.1;margin-bottom:16px;letter-spacing:-.3px;}
.section-sub{font-size:16px;color:var(--gray-500);max-width:520px;line-height:1.75;margin-bottom:52px;}
.about-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:24px;position:relative;z-index:1;}
.about-card{background:#fff;border-radius:var(--r-lg);padding:32px 28px;border:1px solid var(--gray-100);transition:all .25s;position:relative;overflow:hidden;}
.about-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--pink);transform:scaleX(0);transform-origin:left;transition:transform .3s ease;}
.about-card:hover{transform:translateY(-6px);box-shadow:0 20px 48px rgba(212,19,103,.12);border-color:var(--pink-light);}
.about-card:hover::before{transform:scaleX(1);}
.about-icon{width:52px;height:52px;border-radius:16px;background:var(--pink-light);display:flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:20px;}
.about-card h3{font-size:17px;font-weight:700;color:var(--heading-color);margin-bottom:10px;}
.about-card p{font-size:15px;color:var(--gray-500);line-height:1.7;}

/* ── GOVERNOR ── */
.gov-banner{background:linear-gradient(135deg,var(--pink-deep) 0%,var(--pink-dark) 100%);border-radius:var(--r-lg);padding:44px 48px;display:flex;align-items:center;gap:32px;margin-bottom:52px;position:relative;overflow:hidden;}
.gov-avatar{width:110px;height:110px;border-radius:50%;background:rgba(255,255,255,.15);border:3px solid rgba(255,255,255,.4);box-shadow:0 0 0 6px rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#fff;flex-shrink:0;}
.gov-avatar img{width:100%;height:100%;border-radius:50%;object-fit:cover;}
.gov-label{font-size:12px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:rgba(255,255,255,.55);margin-bottom:8px;}
.gov-name{font-family:var(--font-display);font-size:32px;font-weight:700;color:#fff;line-height:1.15;}
.gov-sub{font-size:15px;color:rgba(255,255,255,.65);margin-top:6px;}
.gov-badge{margin-left:auto;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;font-size:13px;font-weight:700;padding:10px 20px;border-radius:40px;white-space:nowrap;flex-shrink:0;align-self:flex-start;}

/* ── FUTURE DRRs ── */
.future-drrs{margin-top:52px;padding-top:48px;border-top:1px solid var(--gray-100);}
.future-drrs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;margin-top:28px;}
.future-drr-card{background:var(--gray-50);border:1px solid var(--gray-100);border-radius:var(--r-lg);padding:28px 24px;display:flex;flex-direction:column;align-items:center;gap:16px;text-align:center;}
.future-drr-photo{width:100px;height:100px;border-radius:50%;object-fit:cover;object-position:center top;flex-shrink:0;border:3px solid #fff;box-shadow:0 0 0 3px var(--pink);background:var(--pink-light);}
.future-drr-photo-placeholder{width:100px;height:100px;border-radius:50%;background:var(--pink-light);border:2px dashed var(--pink);box-shadow:0 0 0 3px var(--pink-light);display:flex;align-items:center;justify-content:center;font-size:32px;flex-shrink:0;}
.future-drr-year{background:var(--pink-light);color:var(--pink-dark);font-size:12px;font-weight:700;padding:5px 14px;border-radius:40px;white-space:nowrap;flex-shrink:0;}
.future-drr-info{}
.future-drr-name{font-size:18px;font-weight:700;color:var(--heading-color);margin-top:4px;}
.future-drr-club{font-size:14px;color:var(--gray-500);margin-top:4px;}

/* ── MEET THE DRR ── */
#drr{padding:96px 0;background:var(--gray-50);}
.drr-layout{display:grid;grid-template-columns:300px 1fr;gap:52px;align-items:start;}
.drr-photo-wrap{position:relative;}
.drr-photo{width:100%;aspect-ratio:3/4;border-radius:var(--r-lg);object-fit:cover;background:var(--gray-100);display:flex;align-items:center;justify-content:center;}
.drr-photo-placeholder{width:100%;aspect-ratio:3/4;border-radius:var(--r-lg);background:var(--pink-light);border:2px dashed var(--pink);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;}
.drr-photo-placeholder span{font-size:48px;}
.drr-photo-placeholder p{font-size:13px;color:var(--pink-dark);font-weight:600;text-align:center;padding:0 16px;}
.drr-content{}
.drr-bio{font-size:16px;color:var(--gray-600,#4B5563);line-height:1.85;margin-bottom:36px;font-style:italic;border-left:3px solid var(--pink);padding-left:20px;}
.drr-achievements-title{font-size:13px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--gray-400);margin-bottom:16px;}
.drr-achievements{display:flex;flex-direction:column;gap:10px;}
.drr-achievement{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;background:#fff;border-radius:var(--r-md);border:1px solid var(--gray-100);}
.drr-achievement-dot{width:8px;height:8px;border-radius:50%;background:var(--pink);flex-shrink:0;margin-top:5px;}
.drr-achievement span{font-size:14px;color:var(--gray-700);line-height:1.5;}

/* ── SECRETARIAT LINKS ── */
.secretariat-section{margin-top:52px;padding-top:48px;border-top:1px solid var(--gray-200);}
.secretariat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;margin-top:24px;}
.secretariat-card{background:#fff;border:1px solid var(--gray-100);border-radius:var(--r-lg);padding:24px;display:flex;gap:16px;align-items:flex-start;transition:all .25s;text-decoration:none;border-left:4px solid var(--pink);}
.secretariat-card:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(212,19,103,.1);border-color:var(--pink);}
.secretariat-icon{width:44px;height:44px;border-radius:12px;background:var(--pink-light);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.secretariat-text{}
.secretariat-label{font-size:15px;font-weight:700;color:var(--heading-color);margin-bottom:4px;}
.secretariat-desc{font-size:13px;color:var(--gray-500);line-height:1.5;}
.secretariat-arrow{margin-left:auto;font-size:18px;color:var(--pink);align-self:center;flex-shrink:0;}

/* ── OFFICERS ── */
#officers{background:var(--gray-50);padding:96px 0;}
.officers-intro{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:end;margin-bottom:52px;}
.officers-group{margin-bottom:52px;}
.officers-group:last-child{margin-bottom:0;}
.officers-group-title{font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--pink);margin-bottom:20px;padding-bottom:12px;border-bottom:2px solid var(--pink-light);display:flex;align-items:center;gap:8px;}
.officers-group-title::before{content:'';display:block;width:3px;height:14px;background:var(--pink);border-radius:2px;flex-shrink:0;}
.officers-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:20px;}
.officer-card{background:#fff;border-radius:var(--r-lg);padding:36px 28px;text-align:center;border:1px solid var(--gray-100);transition:all .25s;position:relative;overflow:hidden;cursor:pointer;}
.officer-card:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(212,19,103,.12);border-color:var(--pink-light);}
.officer-card::after{content:'';position:absolute;inset:0;border-radius:var(--r-lg);border:2px solid var(--pink);opacity:0;transition:opacity .25s;}
.officer-card:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(212,19,103,.1);}
.officer-card:hover::after{opacity:1;}
.officer-photo{width:96px;height:96px;border-radius:50%;object-fit:cover;object-position:center top;margin:0 auto 16px;border:3px solid #fff;box-shadow:0 0 0 3px var(--pink);display:block;background:var(--pink-light);}
.officer-avatar{width:96px;height:96px;border-radius:50%;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;font-family:var(--font-display);background:var(--pink-light);color:var(--pink);position:relative;}
.officer-avatar::before{content:'';position:absolute;inset:-3px;border-radius:50%;border:2px dashed var(--pink-light);}
.officer-name{font-size:16px;font-weight:700;color:var(--heading-color);margin-bottom:6px;}
.officer-role{font-size:12px;font-weight:700;letter-spacing:.5px;color:var(--pink);text-transform:uppercase;margin-bottom:8px;}
.officer-club{font-size:14px;color:var(--gray-400);line-height:1.4;}

/* ── EVENTS ── */
#events{padding:96px 0;background:#fff;}
.events-intro{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:end;margin-bottom:52px;}
.events-stack{display:flex;flex-direction:column;gap:20px;}
.event-card{background:#fff;border-radius:var(--r-lg);padding:28px 28px 28px 32px;display:grid;grid-template-columns:auto 1fr;gap:24px;align-items:start;border:1px solid var(--gray-100);transition:all .25s;position:relative;overflow:hidden;}
.event-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--pink);border-radius:4px 0 0 4px;}
.event-card:hover{transform:translateX(4px);box-shadow:0 12px 36px rgba(212,19,103,.1);border-color:var(--pink-light);}
.event-date-box{background:var(--pink);border-radius:var(--r-md);padding:14px 18px;text-align:center;min-width:64px;flex-shrink:0;}
.event-date-box .day{font-family:var(--font-display);font-size:30px;font-weight:900;line-height:1;color:#fff;}
.event-date-box .mo{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.7);margin-top:3px;}
.event-body h3{font-size:18px;font-weight:700;color:var(--heading-color);margin-bottom:6px;}
.event-body p{font-size:15px;color:var(--gray-500);line-height:1.65;margin-bottom:12px;}
.event-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.tag{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:4px 12px;border-radius:40px;}
.tag-pink{background:var(--pink-light);color:var(--pink-dark);}
.tag-dark{background:var(--gray-900);color:#fff;}
.event-loc{font-size:13px;color:var(--gray-400);display:flex;align-items:center;gap:4px;}
.event-loc::before{content:'📍';font-size:11px;}


.council-pin{cursor:pointer;}
.pin-circle{fill:var(--white);stroke:var(--pink);stroke-width:2;transition:all .2s;r:8;}
.pin-dot{fill:var(--pink);transition:all .2s;r:4;}
.council-pin:hover .pin-circle,.council-pin.active .pin-circle{fill:var(--pink);r:10;}
.council-pin:hover .pin-dot,.council-pin.active .pin-dot{fill:var(--white);r:5;}
.council-pin.active .pin-circle{stroke-width:3;}

/* ── RESOURCES ── */
#resources{padding:96px 0;background:var(--gray-50);}
.resources-header{display:grid;grid-template-columns:1fr auto;gap:24px;align-items:end;margin-bottom:48px;}
.resources-btn{display:inline-flex;align-items:center;gap:10px;background:var(--pink);color:#fff;font-size:14px;font-weight:700;padding:13px 28px;border-radius:40px;white-space:nowrap;transition:all .2s;align-self:end;}
.resources-btn:hover{background:var(--pink-dark);transform:translateY(-2px);box-shadow:0 8px 24px rgba(212,19,103,.3);}
.resources-btn::after{content:'↗';font-size:16px;}
.resources-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;}
.resource-card{background:#fff;border-radius:var(--r-lg);padding:28px;border:1px solid var(--gray-100);display:flex;gap:18px;align-items:flex-start;transition:all .25s;}
.resource-card:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(212,19,103,.09);border-color:var(--pink-light);}
.resource-card-link{text-decoration:none;cursor:pointer;position:relative;}
.resource-link-arrow{position:absolute;top:14px;right:14px;font-size:14px;color:var(--pink);opacity:.6;}

.cal-info p{font-size:13px;color:var(--gray-500);line-height:1.6;margin-bottom:6px;}
.cal-loc{font-size:12px;color:var(--gray-400);}
.cal-loc::before{content:'📍';font-size:11px;margin-right:3px;}

/* ── CALENDAR ── */
#calendar{padding:96px 0;background:var(--gray-50);}
.cal-embed{width:100%;height:600px;border:none;border-radius:var(--r-lg);margin-top:48px;}
.cal-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;margin-top:48px;}

.cal-title{font-size:14px;font-weight:700;color:var(--heading-color);margin-bottom:4px;}

.cal-type{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:2px 8px;border-radius:20px;background:var(--pink-light);color:var(--pink-dark);margin-bottom:4px;display:inline-block;}
.cal-placeholder{background:rgba(255,255,255,.04);border:1.5px dashed rgba(212,19,103,.3);border-radius:var(--r-xl);padding:52px 24px;text-align:center;margin-top:48px;}
.cal-placeholder p{font-size:15px;color:var(--gray-500);margin-bottom:6px;}
.cal-placeholder span{font-size:13px;color:var(--gray-400);}

/* ── CALENDAR ── */
#calendar{padding:96px 0;background:var(--gray-50);}
.calendar-embed{width:100%;height:500px;border:none;border-radius:var(--r-lg);margin-top:48px;}
.calendar-list{display:flex;flex-direction:column;gap:14px;margin-top:48px;}
.cal-item{background:#fff;border:1px solid var(--gray-100);border-radius:var(--r-lg);padding:18px 24px;display:grid;grid-template-columns:64px 1fr auto;gap:20px;align-items:center;transition:all .25s;border-left:4px solid var(--pink);}
.cal-item:hover{box-shadow:0 8px 24px rgba(212,19,103,.08);transform:translateX(4px);}
.cal-date{text-align:center;}
.cal-day{font-family:var(--font-display);font-size:28px;font-weight:900;color:var(--pink);line-height:1;}
.cal-month{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--gray-400);margin-top:2px;}
.cal-title{font-size:15px;font-weight:700;color:var(--heading-color);margin-bottom:4px;}
.cal-loc{font-size:13px;color:var(--gray-500);}
.cal-loc::before{content:'📍';font-size:11px;margin-right:4px;}
.cal-tag{display:inline-block;background:var(--pink-light);color:var(--pink-dark);font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:4px 12px;border-radius:40px;white-space:nowrap;}
.calendar-placeholder{background:rgba(212,19,103,.04);border:1.5px dashed rgba(212,19,103,.25);border-radius:var(--r-lg);padding:52px 24px;text-align:center;margin-top:48px;}
.calendar-placeholder p{font-size:15px;color:var(--gray-500);margin-bottom:6px;}
.calendar-placeholder span{font-size:13px;color:var(--gray-400);}
@media(max-width:640px){
  .cal-item{grid-template-columns:52px 1fr;gap:14px;}
  .cal-tag{display:none;}
}

/* ── MEMBERSHIP INQUIRY ── */
#membership-inquiry{padding:0 0 48px;}
.membership-card{background:linear-gradient(135deg,var(--pink-deep) 0%,var(--pink-dark) 100%);border-radius:var(--r-xl);padding:28px 36px;display:flex;align-items:center;justify-content:space-between;gap:24px;}
.membership-left{display:flex;align-items:center;gap:20px;}
.membership-icon{font-size:36px;flex-shrink:0;}
.membership-title{font-size:18px;font-weight:700;color:#fff;margin-bottom:6px;}
.membership-sub{font-size:14px;color:rgba(255,255,255,.7);line-height:1.6;max-width:480px;}
.membership-btn{display:inline-flex;align-items:center;background:#fff;color:var(--pink-deep);font-size:13px;font-weight:700;padding:12px 24px;border-radius:40px;white-space:nowrap;flex-shrink:0;text-decoration:none;transition:all .2s;}
.membership-btn:hover{background:var(--pink-light);transform:translateY(-2px);}
@media(max-width:640px){
  .membership-card{flex-direction:column;align-items:flex-start;gap:20px;}
  .membership-btn{width:100%;justify-content:center;}
}
body.dark-mode .membership-card{background:linear-gradient(135deg,#1a0510 0%,#2d0920 100%);}

/* ── CLUBS ── */
#clubs{background:var(--white);padding:96px 0;}
.clubs-tabs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:32px;}
.clubs-tab{font-size:12px;font-weight:700;padding:7px 16px;border-radius:40px;border:1.5px solid var(--gray-200);color:var(--gray-500);cursor:pointer;transition:all .2s;background:#fff;}
.clubs-tab:hover{border-color:var(--pink);color:var(--pink);}
.clubs-tab.active{background:var(--pink);border-color:var(--pink);color:#fff;}
.clubs-panel{display:none;}
.clubs-panel.active{display:block;}
.clubs-council-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.clubs-council-name{font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--heading-color);}
.clubs-council-count{font-size:12px;font-weight:700;background:var(--pink-light);color:var(--pink-dark);padding:4px 12px;border-radius:40px;}
.clubs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;}
/* Club cards */
.club-card{background:var(--gray-50);border:1px solid var(--gray-100);border-radius:var(--r-md);padding:14px 16px;display:flex;align-items:center;gap:12px;transition:all .2s;cursor:pointer;}
.club-card:hover{background:#fff;border-color:var(--pink-light);box-shadow:0 4px 16px rgba(212,19,103,.08);transform:translateY(-1px);}
.club-card.active{border-color:var(--pink);background:#fff;box-shadow:0 4px 16px rgba(212,19,103,.12);}
.club-card-dot{width:8px;height:8px;border-radius:50%;background:var(--pink);flex-shrink:0;transition:transform .2s;}
.club-card.active .club-card-dot{transform:scale(1.4);}
.club-card-name{font-size:14px;font-weight:600;color:var(--heading-color);line-height:1.4;flex:1;}
.club-card-icon{font-size:12px;color:var(--gray-300);flex-shrink:0;transition:color .2s;}
.club-card:hover .club-card-icon,.club-card.active .club-card-icon{color:var(--pink);}
/* Modal overlay */
.club-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;pointer-events:none;transition:opacity .25s;}
.club-modal-overlay.open{opacity:1;pointer-events:auto;}
.club-modal{background:#fff;border-radius:var(--r-xl);width:100%;max-width:480px;box-shadow:0 24px 64px rgba(0,0,0,.18);transform:translateY(16px) scale(.97);transition:transform .25s,opacity .25s;overflow:hidden;}
.club-modal-overlay.open .club-modal{transform:translateY(0) scale(1);}
.club-modal-header{background:var(--pink);padding:24px 28px;position:relative;}
.club-modal-pill{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:rgba(255,255,255,.65);margin-bottom:6px;}
.club-modal-name{font-family:var(--font-display);font-size:20px;font-weight:700;color:#fff;line-height:1.25;padding-right:32px;}
.club-modal-close{position:absolute;top:20px;right:20px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;line-height:1;}
.club-modal-close:hover{background:rgba(255,255,255,.3);}
.club-modal-body{padding:24px 28px;display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.club-detail-item{display:flex;flex-direction:column;gap:4px;}
.club-detail-item.full{grid-column:1/-1;}
.club-detail-label{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--gray-400);}
.club-detail-value{font-size:14px;color:var(--heading-color);font-weight:500;line-height:1.5;}
.club-detail-value.placeholder{color:var(--gray-300);font-style:italic;font-weight:400;}
.club-modal-footer{padding:16px 28px;border-top:1px solid var(--gray-100);display:flex;justify-content:flex-end;}
.club-modal-dismiss{font-size:13px;font-weight:700;color:var(--pink);background:var(--pink-light);border:none;padding:9px 20px;border-radius:40px;cursor:pointer;transition:all .2s;}
.club-modal-dismiss:hover{background:var(--pink);color:#fff;}
@media(max-width:480px){
  .club-modal-body{grid-template-columns:1fr;}
  .club-detail-item.full{grid-column:auto;}
  .club-modal{border-radius:var(--r-lg);}
}
@media(max-width:640px){
  .clubs-tabs{gap:6px;}
  .clubs-tab{font-size:11px;padding:5px 12px;}
  .clubs-grid{grid-template-columns:1fr;}
}

/* ── QR CODE ── */
.qr-strip{display:flex;align-items:center;gap:14px;margin-top:20px;padding:14px 16px;background:var(--gray-50);border-radius:var(--r-md);border:1px solid var(--gray-100);}
.qr-svg-wrap{flex-shrink:0;border-radius:8px;overflow:hidden;border:1px solid var(--gray-100);}
.qr-info{}
.qr-label{font-size:10px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--gray-400);margin-bottom:3px;}
.qr-title{font-size:13px;font-weight:700;color:var(--heading-color);margin-bottom:2px;}
.qr-url{font-size:11px;color:var(--pink);word-break:break-all;}
body.dark-mode .qr-strip{background:var(--dm-surface2);border-color:var(--dm-border);}
body.dark-mode .qr-svg-wrap{border-color:var(--dm-border);}
body.dark-mode .qr-svg-wrap svg rect{fill:var(--dm-surface);}

/* ── CONTACT ── */
#contact{padding:96px 0;background:var(--gray-50);}
.contact-wrap{display:grid;grid-template-columns:1fr 1fr;gap:32px;margin-top:52px;}
.contact-card{background:#fff;border-radius:var(--r-lg);padding:36px;border:1px solid var(--gray-100);}
.contact-card-title{font-size:18px;font-weight:700;color:var(--heading-color);margin-bottom:6px;padding-bottom:20px;border-bottom:2px solid var(--pink);display:inline-block;}
.contact-rows{margin-top:24px;}
.contact-row{display:flex;align-items:flex-start;gap:14px;margin-bottom:18px;}
.contact-row-icon{width:38px;height:38px;border-radius:10px;background:var(--pink-light);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.contact-row-text strong{display:block;font-size:11px;font-weight:700;color:var(--gray-400);text-transform:uppercase;letter-spacing:.7px;margin-bottom:2px;}
.contact-row-text span{font-size:15px;color:var(--gray-700);}
.socials{display:flex;gap:10px;margin-top:24px;padding-top:24px;border-top:1px solid var(--gray-100);}
.soc-btn{height:40px;padding:0 16px;border-radius:40px;background:var(--gray-900);color:#fff;display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;letter-spacing:.5px;cursor:pointer;transition:all .2s;}
.soc-btn:hover{background:var(--pink);transform:translateY(-2px);}
.quick-links-list{list-style:none;margin-top:24px;}
.quick-links-list li{border-bottom:1px solid var(--gray-100);}
.quick-links-list li:last-child{border-bottom:none;}
.quick-links-list a{display:flex;align-items:center;justify-content:space-between;padding:13px 0;font-size:14px;font-weight:500;color:var(--gray-700);transition:color .15s;}
.quick-links-list a:hover{color:var(--pink);}
.quick-links-list a::after{content:'→';color:var(--gray-200);transition:color .15s;}
.quick-links-list a:hover::after{color:var(--pink);}


/* ── MAP ── */
#map{padding:96px 0;background:var(--white);}
.map-layout{display:grid;grid-template-columns:1fr 420px;gap:36px;align-items:start;}
.map-svg-wrap{position:relative;}
.map-svg-wrap svg{width:100%;height:auto;display:block;}
.map-region{fill:var(--pink-light);stroke:#fff;stroke-width:2;cursor:pointer;transition:fill .25s,opacity .25s;opacity:.4;}
.map-region:hover{fill:var(--pink);opacity:.7;}
.map-region.active{fill:var(--pink);opacity:1;}
.map-region.dimmed{fill:var(--pink-light);opacity:.4;}
.map-reset{display:none;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--pink);cursor:pointer;padding:5px 14px;border-radius:40px;border:1.5px solid var(--pink);transition:all .2s;margin-left:auto;}
.map-reset:hover{background:var(--pink);color:#fff;}
.map-reset.show{display:flex;}
.map-legend-row{display:flex;align-items:center;gap:0;margin-top:24px;}
.map-tip{position:absolute;background:var(--gray-900);color:#fff;padding:7px 13px;border-radius:8px;font-size:12px;font-weight:700;pointer-events:none;white-space:nowrap;opacity:0;transition:opacity .15s;z-index:10;transform:translateX(-50%);}
.map-tip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:var(--gray-900);}
.map-panel{background:var(--gray-50);border-radius:var(--r-xl);border:1px solid var(--gray-200);padding:24px;min-height:360px;display:flex;flex-direction:column;}
.map-panel-idle{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:10px;}
.map-idle-icon{width:52px;height:52px;border-radius:50%;background:var(--pink-light);display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto;}
.map-idle-text{font-size:14px;color:var(--gray-400);line-height:1.6;}
.map-panel-area{display:none;flex-direction:column;gap:14px;}
.map-panel-area.show{display:flex;}
.map-area-pill{display:inline-block;background:var(--pink-light);color:var(--pink-dark);font-size:11px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;padding:4px 14px;border-radius:40px;width:fit-content;}
.map-area-name{font-family:var(--font-display);font-size:20px;font-weight:700;color:var(--heading-color);line-height:1.2;}
.map-area-sub{font-size:13px;color:var(--gray-500);}
.map-divider{height:1px;background:var(--gray-200);}
.mclubs-label{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--gray-400);}
.mclubs-list{display:flex;flex-direction:column;gap:5px;}
.mclub-item{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;background:#fff;border-radius:8px;border:1px solid var(--gray-200);font-size:13px;font-weight:600;color:var(--heading-color);cursor:pointer;transition:all .2s;width:100%;}
.mclub-item:hover{border-color:var(--pink);background:var(--pink-pale);box-shadow:0 2px 8px rgba(212,19,103,.08);}
.mclub-item-arrow{display:none;}
.mclub-item span{flex:1;line-height:1.45;text-align:left;}
.mclub-item .mclub-dot{margin-top:3px;flex-shrink:0;}
.mclub-item:hover .mclub-dot{background:var(--pink-dark);}
.mclub-dot{width:7px;height:7px;border-radius:50%;background:var(--pink);flex-shrink:0;}
.map-view-btn{display:block;text-align:center;padding:11px;border-radius:40px;border:1.5px solid var(--pink);font-size:13px;font-weight:700;color:var(--pink);cursor:pointer;transition:all .2s;margin-top:4px;}
.map-view-btn:hover{background:var(--pink);color:#fff;}
.map-legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:24px;justify-content:center;}
.mleg-item{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--gray-500);cursor:pointer;padding:5px 14px;border-radius:40px;border:1px solid var(--gray-200);transition:all .2s;}
.mleg-item::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--pink-light);border:1.5px solid var(--pink);flex-shrink:0;}
.mleg-item:hover,.mleg-item.active{background:var(--pink-light);border-color:var(--pink);color:var(--pink-dark);}
.mleg-item.active::before{background:var(--pink);}

/* ── CREDIT BAR ── */
#credit-bar{background:var(--gray-900);padding:10px 28px;display:flex;justify-content:center;align-items:center;}
#credit-bar p{font-size:12px;color:rgba(255,255,255,.35);letter-spacing:.3px;}
#credit-bar span{color:rgba(255,255,255,.6);font-weight:600;}

/* ── FOOTER ── */
#footer{background:var(--pink-deep);padding:52px 48px 32px;}
.footer-top{max-width:1280px;margin:0 auto;display:grid;grid-template-columns:1.6fr 1fr 1fr;gap:48px;padding-bottom:40px;border-bottom:1px solid rgba(255,255,255,.08);}
.footer-brand img{height:36px;width:auto;margin-bottom:16px;}
.footer-brand-name{font-size:13px;font-weight:600;color:#fff;margin-bottom:6px;line-height:1.5;}
.footer-brand-sub{font-size:12px;color:rgba(255,255,255,.35);}
#footer-cols{display:contents;}
.footer-col-title{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:16px;}
.footer-col a{display:block;font-size:13px;color:rgba(255,255,255,.5);margin-bottom:10px;transition:color .15s;}
.footer-col a:hover{color:#fff;}
.footer-bottom{max-width:1280px;margin:28px auto 0;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
.footer-copy{font-size:12px;color:rgba(255,255,255,.2);}
.footer-dev{font-size:12px;color:rgba(255,255,255,.2);}
.footer-dev a{color:rgba(255,255,255,.5);text-decoration:underline;text-underline-offset:3px;transition:color .15s;}
.footer-dev a:hover{color:#fff;}

/* ── BACK TO TOP ── */
#btt{position:fixed;bottom:28px;right:28px;width:44px;height:44px;border-radius:50%;background:var(--pink);color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;pointer-events:none;transition:all .25s;border:none;box-shadow:0 4px 20px rgba(212,19,103,.4);z-index:50;}
#btt.show{opacity:1;pointer-events:auto;}
#btt:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(212,19,103,.5);}

/* ── SEARCH ── */
.clubs-search-wrap{position:relative;margin-bottom:28px;}
.clubs-search{width:100%;padding:12px 44px 12px 18px;border-radius:40px;border:1.5px solid var(--gray-200);font-size:14px;font-family:var(--font-body);color:var(--heading-color);background:#fff;outline:none;transition:border-color .2s,box-shadow .2s;}
.clubs-search:focus{border-color:var(--pink);box-shadow:0 0 0 3px rgba(212,19,103,.1);}
.clubs-search-icon{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none;}
.clubs-search-results{position:absolute;top:calc(100% + 8px);left:0;right:0;background:#fff;border:1px solid var(--gray-200);border-radius:var(--r-lg);box-shadow:0 8px 32px rgba(0,0,0,.12);z-index:50;max-height:320px;overflow-y:auto;}
.clubs-search-item{padding:11px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;border-bottom:0.5px solid var(--gray-100);transition:background .15s;}

/* ── ANNOUNCEMENTS ── */
#announcements{padding:0;}
.announce-bar{background:var(--pink-deep);padding:10px 28px;}
.announce-inner{max-width:1280px;margin:0 auto;display:flex;flex-direction:column;gap:6px;}
.announce-item{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.announce-dot-info{width:7px;height:7px;border-radius:50%;background:#60A5FA;flex-shrink:0;}
.announce-dot-warning{width:7px;height:7px;border-radius:50%;background:#FCD34D;flex-shrink:0;}
.announce-dot-success{width:7px;height:7px;border-radius:50%;background:#34D399;flex-shrink:0;}
.announce-text{font-size:13px;color:rgba(255,255,255,.85);flex:1;}
.announce-link{font-size:12px;font-weight:700;color:#fff;background:rgba(255,255,255,.15);padding:3px 12px;border-radius:40px;white-space:nowrap;text-decoration:none;transition:background .2s;}

/* ── ACHIEVEMENTS ── */

#dark-toggle:hover{transform:translateY(-2px);}
body.dark-mode #dark-toggle{background:var(--pink);color:#fff;}

/* ── THEME SONG ── */
#theme-song{padding:72px 0;background:linear-gradient(135deg,var(--pink-deep) 0%,var(--pink-dark) 60%,#9d0a44 100%);position:relative;overflow:hidden;}
#theme-song::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.06) 1px,transparent 1px);background-size:24px 24px;pointer-events:none;}
.theme-song-inner{position:relative;z-index:1;display:grid;grid-template-columns:1fr auto;gap:48px;align-items:center;}
.theme-song-eyebrow{font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.theme-song-eyebrow::before{content:'🎵';font-size:14px;}
.theme-song-title{font-family:var(--font-display);font-size:clamp(28px,4vw,44px);font-weight:900;color:#fff;line-height:1.1;margin-bottom:8px;}
.theme-song-sub{font-size:13px;font-weight:600;color:rgba(255,255,255,.5);letter-spacing:.5px;margin-bottom:14px;}
.theme-song-desc{font-size:15px;color:rgba(255,255,255,.7);line-height:1.7;max-width:520px;margin-bottom:28px;}
.theme-song-btns{display:flex;gap:12px;flex-wrap:wrap;}
.theme-song-btn{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:700;padding:11px 22px;border-radius:40px;text-decoration:none;transition:all .2s;cursor:pointer;}
.theme-song-btn-primary{background:#fff;color:var(--pink-deep);}
.theme-song-btn-primary:hover{background:var(--pink-light);transform:translateY(-2px);}
.theme-song-btn-secondary{background:rgba(255,255,255,.12);color:#fff;border:1.5px solid rgba(255,255,255,.25);}
.theme-song-btn-secondary:hover{background:rgba(255,255,255,.22);transform:translateY(-2px);}
.theme-song-visual{flex-shrink:0;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;position:relative;}
.theme-song-visual::before{content:'';position:absolute;inset:-8px;border-radius:50%;border:1.5px dashed rgba(255,255,255,.2);animation:spin 20s linear infinite;}
.theme-song-note{font-size:72px;line-height:1;}
@keyframes spin{to{transform:rotate(360deg);}}
@media(prefers-reduced-motion:reduce){.theme-song-visual::before{animation:none;}}
@media(max-width:640px){
  .theme-song-inner{grid-template-columns:1fr;}
  .theme-song-visual{display:none;}
}
body.dark-mode #theme-song{background:linear-gradient(135deg,#1a0510 0%,#2d0920 60%,#1f0515 100%);}

/* ── SCROLL ANIMATIONS ── */
.reveal{opacity:0;transform:translateY(28px);transition:opacity .6s ease,transform .6s ease;}
.reveal.visible{opacity:1;transform:translateY(0);}
.reveal-delay-1{transition-delay:.1s;}
.reveal-delay-2{transition-delay:.2s;}
.reveal-delay-3{transition-delay:.3s;}
.reveal-delay-4{transition-delay:.4s;}
.reveal-delay-5{transition-delay:.5s;}
.reveal-delay-6{transition-delay:.6s;}
@media(prefers-reduced-motion:reduce){
  .reveal{opacity:1;transform:none;transition:none;}
}



/* Tablet — 900px */
@media(max-width:900px){
  /* Hero */
  #hero{flex-direction:column;min-height:auto;}
  .hero-left{flex:none;padding:40px 24px 36px;min-height:auto;}
  .hero-left-logo{max-width:220px;margin:0 auto;}
  .hero-right{padding:40px 28px 56px;}
  .hero-right::before{display:none;}

  /* Impact */
  .impact-grid{grid-template-columns:repeat(3,1fr);}
  .impact-num{font-size:28px;}

  /* Officers / Events intros */
  .officers-intro,.events-intro{grid-template-columns:1fr;gap:12px;}

  /* DRR layout */
  .drr-layout{grid-template-columns:200px 1fr;gap:32px;}

  /* Map */
  .map-layout{grid-template-columns:1fr;gap:24px;}
  .map-panel{min-height:auto;}

  /* Footer */
  .footer-top{grid-template-columns:1fr 1fr;}
  
}

/* Mobile — 640px */
@media(max-width:640px){
  /* Nav */
  .nav-links{display:none;}
  .nav-ham{display:block;}
  #nav{z-index:200;}
  #mobile-menu{z-index:199;}

  /* Hero */
  .hero-left{padding:32px 20px 28px;}
  .hero-left-logo{max-width:180px;}
  .hero-left-tagline{font-size:11px;}
  #hero h1{font-size:clamp(24px,7vw,36px);}
  .hero-sub{font-size:15px;}
  .hero-btns{flex-direction:column;gap:10px;}
  .btn{width:100%;justify-content:center;}
  .hero-right{padding:32px 20px 48px;}
  .hero-scroll{display:none;}

  /* Impact — single row, smaller */
  .impact-grid{grid-template-columns:repeat(3,1fr);}
  .impact-item{padding:24px 12px;}
  .impact-num{font-size:24px;}
  .impact-lbl{font-size:10px;}
  .impact-item{border-right:none;border-bottom:1px solid rgba(255,255,255,.06);}
  .impact-item:not(:last-child){border-right:1px solid rgba(255,255,255,.06);}
  .impact-item:last-child{border-bottom:none;}

  /* Sections padding */
  #about,#officers,#events,#resources,#clubs,#contact,#map,#drr{padding:56px 0;}

  /* About cards */
  .about-grid{grid-template-columns:1fr;}

  /* Governor banner */
  .gov-banner{flex-direction:column;align-items:flex-start;gap:16px;padding:20px;}
  .gov-badge{margin-left:0;}

  /* Officers grid */
  .officers-grid{grid-template-columns:repeat(2,1fr);gap:12px;}

  /* Future DRRs */
  .future-drrs-grid{grid-template-columns:1fr;}
  .future-drr-card{flex-direction:column;align-items:flex-start;gap:8px;}

  /* DRR section */
  .drr-layout{grid-template-columns:1fr;}
  .drr-photo-wrap{max-width:220px;margin:0 auto;}
  .drr-bio{font-size:14px;padding-left:14px;}

  /* Events */
  .event-card{grid-template-columns:1fr;gap:12px;}
  .event-date-box{width:fit-content;}

  /* Resources */
  .resources-header{grid-template-columns:1fr;gap:16px;}
  .resources-btn{width:100%;justify-content:center;}
  .resources-grid{grid-template-columns:1fr;}

  /* Secretariat */
  .secretariat-grid{grid-template-columns:1fr;}
  .secretariat-card{flex-wrap:wrap;}

  /* Map — stack map above panel, legend wraps */
  .map-layout{grid-template-columns:1fr;}
  .map-panel{min-height:auto;order:2;}
  .map-svg-wrap{order:1;}
  .map-legend{gap:6px;}
  .mleg-item{font-size:11px;padding:4px 10px;}
  .map-legend-row{flex-wrap:wrap;gap:8px;}
  .map-reset{margin-left:0;}
  /* Bigger tap targets for pins on mobile */
  .council-pin .pin-circle{r:12;}
  .council-pin .pin-dot{r:6;}

  /* Contact */
  .contact-wrap{grid-template-columns:1fr;}

  /* Footer */
  .footer-top{grid-template-columns:1fr;gap:24px;}
.footer-brand{grid-column:auto;}
  .footer-brand{grid-column:auto;}
  .footer-bottom{flex-direction:column;align-items:flex-start;gap:8px;}
}

/* Small mobile — 400px */
@media(max-width:400px){
  .container{padding:0 16px;}
  .officers-grid{grid-template-columns:1fr;}
  .impact-grid{grid-template-columns:1fr;}
  .impact-item{border-right:none !important;border-bottom:1px solid rgba(255,255,255,.06);}
  .impact-item:last-child{border-bottom:none;}
  .hero-left-logo{max-width:150px;}
  #hero h1{font-size:22px;}
  .section-heading{font-size:22px;}
}

@media(prefers-reduced-motion:reduce){*,*::before,*::after{transition:none!important;animation:none!important;}}
